name: wisdom_app
description: A minimal wisdom app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  app_tracking_transparency: ^2.0.6
  in_app_purchase: ^3.2.0
  url_launcher: ^6.3.1

  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  vibration: ^3.1.3
  cupertino_icons: ^1.0.8
  audioplayers: ^6.6.0
  google_mobile_ads: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/

flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true